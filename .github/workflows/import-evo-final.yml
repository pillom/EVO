name: Import EVO Final Snapshot

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create orphan snapshot from EVO_final
        run: |
          set -euo pipefail
          git remote add evo_final https://github.com/pillom/EVO_final.git
          git fetch --depth 1 evo_final paper-final-experiments-v1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan evo-import FETCH_HEAD
          git commit -m "Initial EVO release"
          git push --force origin evo-import:main
